<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Y-FETISH</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>

<header>

<div class="logo">
    <span class="logo-y">Y</span><span class="logo-text">-FETISH</span>
</div>

<div class="header-buttons">

<button id="loginBtn">
Войти
</button>

<button id="registerBtn">
Регистрация
</button>

<button id="menuBtn">
<i class="fas fa-bars"></i>
</button>

</div>

</header>


<section class="addSection">

<button id="addProfileBtn">
<i class="fas fa-plus"></i>
Добавить объявление
</button>

</section>


<section class="searchBox">

<select id="city">
<option>Ивано-Франковск</option>
<option>Львов</option>
<option>Киев</option>
<option>Одесса</option>
<option>Днепр</option>
</select>

<select id="category">
<option>Знакомства</option>
<option>Эротический массаж</option>
<option>Госпожа</option>
<option>раб</option>
</select>

<div class="search">

<input
id="searchInput"
type="text"
placeholder="Поиск объявлений">

<button id="searchBtn">

<i class="fas fa-search"></i>

</button>

</div>

</section>


<section id="ads">

</section>


<div id="menu" class="menu">

<a href="index.html">
Главная
</a>

<a href="profile.html">
Мой профиль
</a>

<a href="favorites.html">
Избранное
</a>

<a href="add.html">
Добавить объявление
</a>

</div>

<script src="app.js"></script>

</body>
</html>
